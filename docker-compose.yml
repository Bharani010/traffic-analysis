# ==============================================================================
# Traffic Analysis Platform — Docker Compose
# ==============================================================================
# Usage:
#   docker compose up --build        Start all services
#   docker compose up -d             Start detached
#   docker compose down              Stop all services
#   docker compose logs -f           Follow logs
# ==============================================================================

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: ta-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-traffic_analysis}
      POSTGRES_USER: ${POSTGRES_USER:-traffic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traffic_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-traffic_user} -d ${POSTGRES_DB:-traffic_analysis}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - traffic-net

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: ta-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traffic-net

  # ── Backend (FastAPI) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ta-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-traffic_user}:${POSTGRES_PASSWORD:-traffic_password_change_me}@postgres:5432/${POSTGRES_DB:-traffic_analysis}
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - traffic-net

  # ── Frontend (React + Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ta-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - traffic-net

# ── Volumes ──
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ──
networks:
  traffic-net:
    driver: bridge
