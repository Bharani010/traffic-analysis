name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -e .[dev]
          
      - name: Lint with ruff
        run: |
          cd backend
          ruff check .
          
      - name: Run Pytest
        run: |
          cd backend
          pytest

  test-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install PySpark & Data dependencies
        run: |
          cd data
          python -m pip install --upgrade pip
          pip install -e .[dev]
          
      - name: Lint with ruff
        run: |
          cd data
          ruff check .
